server.port = 5555
executor.business_threads = 2
server.idle_timeout_seconds = 60
server.idle_check_interval_seconds = 10

storage.offline_message_file = offline_messages.txt
storage.offline_message_store = mysql
storage.online_status_store = redis
storage.user_store = mysql

mysql.host = 127.0.0.1
mysql.port = 3306
mysql.user = demo_user
mysql.password = your_mysql_password
mysql.database = asiochat

redis.host = 127.0.0.1
redis.port = 6379
redis.password = your_redis_password
redis.db = 0
redis.online_ttl_seconds = 30

ai_agents.default.enabled = true
ai_agents.default.bot_name = lobby-bot
ai_agents.default.welcome_message = lobby-bot 已加入当前房间。你们在这个房间里使用 /pm ai 或 /pm 小d 提问时，我会公开回复。
ai_agents.default.provider = deepseek
ai_agents.default.model = deepseek-chat
ai_agents.default.base_url = https://api.deepseek.com
ai_agents.default.endpoint = /chat/completions
ai_agents.default.api_key = your_api_key
ai_agents.default.persona = 你是房间里的 AI 助手，回答要简洁、自然，适合群聊公开展示。
ai_agents.default.reply_template = [{room}] {persona} 用户 {user} 刚才说：{message}
ai_agents.default.history_messages = 8
ai_agents.default.temperature = 0.7
ai_agents.default.max_tokens = 256
ai_agents.default.timeout_seconds = 20
ai_agents.default.curl_executable = curl
